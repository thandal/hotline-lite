<style>
h2 { margin: 20px 0 8px; font-size: 1.1em; }
.card { background: #fff; border-radius: 6px; padding: 16px; margin-bottom: 16px; max-width: 800px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #eee; }
th { color: #888; font-size: 12px; text-transform: uppercase; }
button.del { background: #dc2626; }
button.del:hover { background: #b91c1c; }
button.sec { background: #fff; color: #2563eb; border: 1px solid #2563eb; }
.tag { display: inline-block; background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin: 1px; }
.msg { padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; max-width: 800px; }
.err { background: #fef2f2; color: #dc2626; }
.ok { background: #f0fdf4; color: #166534; }
.row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.row input { flex: 1; min-width: 100px; }
.hide { display: none; }
</style>

<h1>Hotline Admin <button class="sec" onclick="logout()" style="float:right">Log Out</button></h1>
<div id="msg" class="msg hide"></div>

<div class="card">
  <h2>Operators <button onclick="toggleAdd()" style="float:right" class="sec">+ Add</button></h2>
  <div id="addForm" class="row hide">
    <input id="aNames" placeholder="Names: Alice, Al">
    <input id="aPhone" placeholder="+12025551234">
    <input id="aLangs" placeholder="en,es">
    <button onclick="addOp()">Add</button>
  </div>
  <table><thead><tr><th>Names</th><th>Phone</th><th>Languages</th><th></th></tr></thead><tbody id="opBody"></tbody></table>
</div>

<div class="card">
  <h2>Blocklist</h2>
  <div id="blockList"></div>
  <div class="row">
    <input id="bNum" placeholder="+12025551234">
    <button onclick="addBlock()">Block</button>
  </div>
</div>

<div class="card">
  <h2>Languages</h2>
  <div id="langList"></div>
  <div class="row">
    <input id="lCode" placeholder="fr">
    <button onclick="addLang()">Add</button>
  </div>
</div>

<script>
var DATA = {};

function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hide'); }
function hide(id) { $(id).classList.add('hide'); }

function msg(txt, isErr) {
  $('msg').textContent = txt;
  $('msg').className = 'msg ' + (isErr ? 'err' : 'ok');
  show('msg');
  if (!isErr) setTimeout(function() { hide('msg'); }, 3000);
}

function render() {
  $('opBody').innerHTML = DATA.operators.length ? DATA.operators.map(function(op) {
    var names = Array.isArray(op.names) ? op.names.join(', ') : op.names;
    var langs = Array.isArray(op.languages) ? op.languages.join(', ') : op.languages;
    var k = op.key;
    return '<tr id="row-' + k + '">' +
      '<td>' + names + '</td><td>' + op.phone + '</td>' +
      '<td>' + (Array.isArray(op.languages) ? op.languages.map(function(l) { return '<span class="tag">' + l + '</span>'; }).join('') : langs) + '</td>' +
      '<td style="white-space:nowrap">' +
        "<button class=\"sec\" onclick=\"editOp('" + k + "','" + names.replace(/'/g, "\\'") + "','" + op.phone + "','" + langs.replace(/'/g, "\\'") + "')\">Edit</button> " +
        "<button class=\"del\" onclick=\"removeOp('" + k + "')\">Delete</button></td></tr>";
  }).join('') : '<tr><td colspan="4" style="color:#999">None</td></tr>';

  $('blockList').innerHTML = DATA.blocklist.length ? DATA.blocklist.map(function(n, i) {
    return '<span class="tag" style="font-size:14px;padding:4px 8px;margin:2px">' + n +
      ' <span style="cursor:pointer;color:#dc2626" onclick="removeBlock(' + i + ')">&times;</span></span>';
  }).join('') : '<p style="color:#999;font-size:14px">None</p>';

  $('langList').innerHTML = DATA.languages.map(function(l, i) {
    return '<span class="tag" style="font-size:14px;padding:4px 8px;margin:2px">' + l +
      ' <span style="cursor:pointer;color:#dc2626" onclick="removeLang(' + i + ')">&times;</span></span>';
  }).join('') || '<p style="color:#999;font-size:14px">None</p>';
}

function toggleAdd() { $('addForm').classList.toggle('hide'); }

function editOp(key, names, phone, langs) {
  var row = $('row-' + key);
  row.innerHTML =
    '<td><input id="eNames" value="' + names + '" style="width:100%"></td>' +
    '<td><input id="ePhone" value="' + phone + '" style="width:100%"></td>' +
    '<td><input id="eLangs" value="' + langs + '" style="width:100%"></td>' +
    '<td style="white-space:nowrap">' +
      "<button onclick=\"saveOp('" + key + "')\">Save</button> " +
      '<button class="sec" onclick="render()">Cancel</button></td>';
}

window.adminLoad = function(apiFunc) {
  window.api = apiFunc;
  api({ action: 'status' }).then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};

window.addOp = function() {
  var names = $('aNames').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  var phone = $('aPhone').value.trim();
  var languages = $('aLangs').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  if (!names.length || !phone || !languages.length) return msg('All fields required', true);
  api({ action: 'add-operator', names: names, phone: phone, languages: languages })
    .then(function() { $('aNames').value = $('aPhone').value = $('aLangs').value = ''; hide('addForm'); msg('Operator added'); return api({ action: 'status' }); })
    .then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};

window.removeOp = function(key) {
  if (!confirm('Remove this operator?')) return;
  api({ action: 'remove-operator', key: key })
    .then(function() { msg('Removed'); return api({ action: 'status' }); })
    .then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};

window.saveOp = function(key) {
  var names = $('eNames').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  var phone = $('ePhone').value.trim();
  var languages = $('eLangs').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  if (!names.length || !phone || !languages.length) return msg('All fields required', true);
  api({ action: 'update-operator', key: key, names: names, phone: phone, languages: languages })
    .then(function() { msg('Operator updated'); return api({ action: 'status' }); })
    .then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};

window.addBlock = function() {
  var n = $('bNum').value.trim();
  if (!n || !/^\+\d{7,15}$/.test(n)) return msg('Enter valid E.164 number', true);
  api({ action: 'update-blocklist', blocklist: DATA.blocklist.concat([n]) })
    .then(function() { $('bNum').value = ''; msg('Blocked'); return api({ action: 'status' }); })
    .then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};

window.removeBlock = function(i) {
  api({ action: 'update-blocklist', blocklist: DATA.blocklist.filter(function(_, j) { return j !== i; }) })
    .then(function() { msg('Unblocked'); return api({ action: 'status' }); })
    .then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};

window.addLang = function() {
  var l = $('lCode').value.trim().toLowerCase();
  if (!l) return;
  if (DATA.languages.indexOf(l) >= 0) return msg('Already exists', true);
  api({ action: 'update-languages', languages: DATA.languages.concat([l]) })
    .then(function() { $('lCode').value = ''; msg('Added'); return api({ action: 'status' }); })
    .then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};

window.removeLang = function(i) {
  if (DATA.languages.length <= 1) return msg('Need at least one language', true);
  api({ action: 'update-languages', languages: DATA.languages.filter(function(_, j) { return j !== i; }) })
    .then(function() { msg('Removed'); return api({ action: 'status' }); })
    .then(function(d) { DATA = d; render(); }).catch(function(e) { msg(e.message, true); });
};
</script>
